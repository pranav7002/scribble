<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="./images/favicon.png">
    <title>Scribble</title>
    <link rel="stylesheet" href="styles.css" />
    <script type="module" src="src/app.js" defer></script>
</head>

<body>
    <canvas id="canvas">Canvas</canvas>

    <header id="top-bar" class="top-bar">
        <div>
            <h1 id="title">Scribble</h1>
        </div>
        <div class="nav-right">
            <button id="theme-toggle">Dark Mode</button>
            <button id="clear-tool">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path fill="none" stroke="#0E0E0E" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 6h18m-2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m-6 5v6m4-6v6" />
                </svg>
            </button>
        </div>
    </header>
    <main>
        <div class="sidebar">
            <p class="section-heading">TOOLS</p>
            <div class="sidebar-tools" id="sidebar-tools">

                <input type="radio" name="tool" id="brush-tool" hidden />
                <label for="brush-tool" class="tool-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
                        <path fill="#0E0E0E" fill-rule="evenodd"
                            d="M11.423 1A3.577 3.577 0 0 1 15 4.577c0 .27-.108.53-.3.722l-.528.529l-1.971 1.971l-5.059 5.059a3 3 0 0 1-1.533.82l-2.638.528a1 1 0 0 1-1.177-1.177l.528-2.638a3 3 0 0 1 .82-1.533l5.059-5.059l2.5-2.5c.191-.191.451-.299.722-.299m-2.31 4.009l-4.91 4.91a1.5 1.5 0 0 0-.41.766l-.38 1.903l1.902-.38a1.5 1.5 0 0 0 .767-.41l4.91-4.91a2.077 2.077 0 0 0-1.88-1.88Zm3.098.658a3.59 3.59 0 0 0-1.878-1.879l1.28-1.28c.995.09 1.788.884 1.878 1.88l-1.28 1.28Z"
                            clip-rule="evenodd" />
                    </svg>
                    <p>brush</p>
                </label>

                <input type="radio" name="tool" id="dash-brush-tool" hidden />
                <label for="dash-brush-tool" class="tool-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
                        <path fill="#0E0E0E" d="M112 476h160v72H112zm320 0h160v72H432zm320 0h160v72H752z" />
                    </svg>
                    <p>dashed brush</p>
                </label>

                <input type="radio" name="tool" id="dotted-brush-tool" hidden />
                <label for="dotted-brush-tool" class="tool-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 15 15">
                        <path fill="#000000" fill-rule="evenodd"
                            d="M1.5 6.625a.875.875 0 1 0 0 1.75a.875.875 0 0 0 0-1.75Zm4 0a.875.875 0 1 0 0 1.75a.875.875 0 0 0 0-1.75Zm4 0a.875.875 0 1 0 0 1.75a.875.875 0 0 0 0-1.75Zm3.125.875a.875.875 0 1 1 1.75 0a.875.875 0 0 1-1.75 0Z"
                            clip-rule="evenodd" />
                    </svg>
                    <p>dotted brush</p>
                </label>

                <input type="radio" name="tool" id="line-tool" hidden />
                <label for="line-tool" class="tool-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path fill="#0E0E0E"
                            d="M21.71 3.29a1 1 0 0 0-1.42 0l-18 18a1 1 0 0 0 0 1.42a1 1 0 0 0 1.42 0l18-18a1 1 0 0 0 0-1.42Z" />
                    </svg>
                    <p>line</p>
                </label>

                <input type="radio" name="tool" id="rect-tool" hidden />
                <label for="rect-tool" class="tool-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="-2 -4 24 24">
                        <path fill="#0E0E0E"
                            d="M3 2a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1H3zm0-2h14a3 3 0 0 1 3 3v10a3 3 0 0 1-3 3H3a3 3 0 0 1-3-3V3a3 3 0 0 1 3-3z" />
                    </svg>
                    <p>rectangle</p>
                </label>

                <input type="radio" name="tool" id="circle-tool" hidden />
                <label for="circle-tool" class="tool-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path fill="#0E0E0E"
                            d="M12 3a9 9 0 1 0 0 18a9 9 0 0 0 0-18ZM1 12C1 5.925 5.925 1 12 1s11 4.925 11 11s-4.925 11-11 11S1 18.075 1 12Z" />
                    </svg>
                    <p>circle</p>
                </label>

                <input type="radio" name="tool" id="triangle-tool" hidden />
                <label for="triangle-tool" class="tool-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path fill="none" stroke="#0E0E0E" stroke-linecap="round" stroke-linejoin="round"
                            stroke-width="2" d="M2 18a2 2 0 0 0 1.7 3h16.6a2 2 0 0 0 1.7-3L13.8 4a2 2 0 0 0-3.6 0Z" />
                    </svg>
                    <p>triangle</p>
                </label>

                <input type="radio" name="tool" id="image-tool" hidden />
                <label for="image-tool" class="tool-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                        <path fill="#0E0E0E"
                            d="M0 96c0-35.3 28.7-64 64-64h384c35.3 0 64 28.7 64 64v320c0 35.3-28.7 64-64 64H64c-35.3 0-64-28.7-64-64V96zm323.8 106.5c-4.5-6.6-11.9-10.5-19.8-10.5s-15.4 3.9-19.8 10.5l-87 127.6l-26.5-33.1c-4.6-5.7-11.5-9-18.7-9s-14.2 3.3-18.7 9l-64 80c-5.8 7.2-6.9 17.1-2.9 25.4S78.8 416 88 416h336c8.9 0 17.1-4.9 21.2-12.8s3.6-17.4-1.4-24.7l-120-176zM112 192a48 48 0 1 0 0-96a48 48 0 1 0 0 96z" />
                    </svg>
                    <p>random image</p>
                </label>
                <div class="text-tool">
                <input type="radio" name="tool" id="text-tool" hidden />
                <label for="text-tool" class="tool-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="#0E0E0E">
                        <g fill="none" stroke="#0E0E0E" stroke-linejoin="round" stroke-width="4">
                            <rect width="36" height="36" x="6" y="6" rx="3" />
                            <path stroke-linecap="round" d="M16 19v-3h16v3M22 34h4m-2-16v16" />
                        </g>
                    </svg>
                    <p>text</p>
                </label>
                </div>
                <input type="radio" name="tool" id="eraser-tool" hidden />
                <label for="eraser-tool" class="tool-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#0E0E0E" viewBox="0 0 16 16">
                        <path
                            d="M8.086 2.207a2 2 0 0 1 2.828 0l3.879 3.879a2 2 0 0 1 0 2.828l-5.5 5.5A2 2 0 0 1 7.879 15H5.12a2 2 0 0 1-1.414-.586l-2.5-2.5a2 2 0 0 1 0-2.828zm2.121.707a1 1 0 0 0-1.414 0L4.16 7.547l5.293 5.293 4.633-4.633a1 1 0 0 0 0-1.414zM8.746 13.547 3.453 8.254 1.914 9.793a1 1 0 0 0 0 1.414l2.5 2.5a1 1 0 0 0 .707.293H7.88a1 1 0 0 0 .707-.293z" />
                    </svg>
                    <p>eraser</p>
                </label>
                <input type="radio" name="tool" id="selection-tool" hidden />
                <label for="selection-tool" class="tool-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path fill="none" stroke="#0E0E0E" stroke-linecap="round" stroke-linejoin="round"
                            stroke-width="1.5"
                            d="M2 9.2v3.6M12.8 2H9.2M7.5 20H9M20 7.5V9M2.133 4.699c.155-.727.415-1.274.854-1.712c.426-.426.954-.684 1.652-.84m15.228 2.552c-.155-.727-.415-1.274-.854-1.712c-.417-.417-.932-.673-1.608-.83M4.64 19.853c-.698-.156-1.226-.414-1.652-.84c-.43-.43-.69-.965-.845-1.673m11.638 3.626c-1.812.125-3.607-8.326-2.374-9.559s9.684.561 9.559 2.373c-.087 1.187-2.095 1.656-2.037 2.711c.018.309.408.59 1.188 1.154c.543.39 1.096.77 1.629 1.175a.66.66 0 0 1 .234.687a3.35 3.35 0 0 1-2.472 2.473a.66.66 0 0 1-.688-.235c-.404-.533-.784-1.086-1.175-1.628c-.563-.78-.844-1.17-1.153-1.188c-1.055-.059-1.524 1.95-2.71 2.037"
                            color="currentColor" />
                    </svg>
                    <p>selection</p>
                </label>
            </div>
            <div class="fill-section">
            <p class="section-heading" id="fill-selector">FILL</p>
            <div class="fill-selector">
                <input type="radio" name="paint-mode" id="paint-fill" hidden>
                <label for="paint-fill" class="fill-btn">Fill</label>

                <input type="radio" name="paint-mode" id="paint-stroke" hidden checked>
                <label for="paint-stroke" class="fill-btn">Stroke</label>
            </div>
            </div>
            <p class="section-heading">COLOR</p>
            <div class="sidebar-color" id="sidebar-color">
                <input type="color" name="color" id="color-selector" value="#EE2835">
                <p class="section-heading"><span class="color-display" id="color-display">#EE2835</span></p>
            </div>

            <div class="width-slider">
                <label for="stroke-width" class="section-heading">Stroke</label>
                <input type="range" id="stroke-width" name="stroke" min="1" max="30" value="22.5" />
            </div>

            <div class="opacity-slider">
                <label for="opacity" class="section-heading">Opacity</label>
                <input type="range" id="opacity" name="opacity" min="0" max="1" step="0.01" value="0.75" />
            </div>
            <p class="section-heading">LAYER UP/DOWN</p>
            <div class="layer-control" id="layer-control">
                <button class="layer" id="layer-up">
                    <svg viewBox="0 0 76.01 76.01" width="50" height="50">
                        <path fill="rgba(20, 25, 33, 0.88)"
                            d="M 38.0024,9.50133L 58.5858,17.418L 58.5858,22.168L 38.0024,30.0846L 17.4191,22.168L 17.4191,17.418L 38.0024,9.50133 Z M 36.4217,56.6121L 36.4217,39.5889L 28.504,45.9231L 28.504,41.1724L 38.0053,32.4629L 47.5066,41.1724L 47.5066,45.9231L 39.5889,39.5889L 39.5889,56.6121L 36.4217,56.6121 Z M 58.5858,53.8397L 58.5858,58.5897L 38.0024,66.5064L 17.4191,58.5897L 17.4191,53.8397L 34.8382,47.1401L 34.8382,51.7294L 23.7533,55.4244L 38.0053,61.3627L 52.2573,55.4244L 41.1724,51.7295L 41.1724,47.1423L 58.5858,53.8397 Z" />
                    </svg>
                </button>
                <button class="layer" id="layer-down">
                    <svg viewBox="0 0 76.01 76.01" width="50" height="50">
                        <g transform="translate(0,76.01) scale(1,-1)">
                            <path fill="rgba(20, 25, 33, 0.88)"
                                d="M 38.0024,9.50133L 58.5858,17.418L 58.5858,22.168L 38.0024,30.0846L 17.4191,22.168L 17.4191,17.418L 38.0024,9.50133 Z M 36.4217,56.6121L 36.4217,39.5889L 28.504,45.9231L 28.504,41.1724L 38.0053,32.4629L 47.5066,41.1724L 47.5066,45.9231L 39.5889,39.5889L 39.5889,56.6121L 36.4217,56.6121 Z M 58.5858,53.8397L 58.5858,58.5897L 38.0024,66.5064L 17.4191,58.5897L 17.4191,53.8397L 34.8382,47.1401L 34.8382,51.7294L 23.7533,55.4244L 38.0053,61.3627L 52.2573,55.4244L 41.1724,51.7295L 41.1724,47.1423L 58.5858,53.8397 Z" />
                        </g>
                    </svg>
                </button>
            </div>
        </div>
    </main>
    <footer>
        <div class="shortcut-info">
            <p>Use keys 1 to 9 to access tools in order, S for selection, E for eraser</p>
            <p>Use Ctrl/Cmd + z for undo and Ctrl/Cmd + y for redo</p>
        </div>
    </footer>
</body>

</html>
